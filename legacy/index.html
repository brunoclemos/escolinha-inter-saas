<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/>
  <meta name="theme-color" content="#C8102E"/>
  <title>Escola do Inter · Análise de Atletas — Rio Grande/RS</title>
  <meta name="description" content="Sistema de análise e desenvolvimento de jogadores · Escolinha credenciada Sport Club Internacional"/>
  <link rel="icon" type="image/png" href="assets/logo-monograma-bg.png"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="mvp.css?v=10"/>
  <script crossorigin src="https://unpkg.com/react@18.3.1/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js"></script>
</head>
<body>
  <div id="root">
    <!-- Initial loading state (replaced by React when ready) -->
    <div class="boot">
      <div class="boot-mark"><img src="assets/logo-escola-inter-bg.png" alt=""/></div>
      <div class="boot-title">Escola do Inter</div>
      <div class="boot-sub">carregando…</div>
    </div>
  </div>
  <script type="text/babel" src="mvp_base.jsx"></script>
  <script type="text/babel" src="mvp_shell.jsx"></script>
  <script type="text/babel" src="mvp_athletes.jsx"></script>
  <script type="text/babel" src="mvp_tests.jsx"></script>
  <script type="text/babel" src="mvp_reports.jsx"></script>
  <script type="text/babel" src="mvp_system.jsx"></script>
  <script type="text/babel">
    /* ===========================================================
       LoginGate · tela de entrada antes do app
       Mesmo público, força um clique pra "entrar"
       =========================================================== */
    function LoginGate({ onLogin }) {
      const [busy, setBusy] = React.useState(false);
      const handle = (mode) => {
        setBusy(true);
        const fakeUser = mode === 'google'
          ? { name: 'Visitante (Google)', email: 'visitante@gmail.com', mode: 'google' }
          : { name: 'Visitante', email: '—', mode: 'guest' };
        // pequeno delay pra parecer auth real
        setTimeout(() => {
          try { localStorage.setItem('mvp_user', JSON.stringify(fakeUser)); } catch(e){}
          onLogin(fakeUser);
        }, mode === 'google' ? 700 : 250);
      };
      return (
        <div className="login-screen">
          <aside className="login-hero">
            <div className="login-hero-blob"/>
            <div className="login-brand">
              <div className="login-logo"><img src="assets/logo-escola-inter-bg.png" alt="Escola do Inter"/></div>
              <div>
                <div className="login-brand-title">Escola do Inter</div>
                <div className="login-brand-sub">Rio Grande · RS</div>
              </div>
            </div>
            <div className="login-pitch">
              <div className="login-eyebrow">Sistema de Análise de Atletas</div>
              <h1>Acompanhe a evolução técnica, física e comportamental do atleta com o rigor de clubes profissionais.</h1>
              <p>Escolinha credenciada Sport Club Internacional. Avaliações trimestrais, relatórios em PDF para a família e dossiê técnico para a base do Inter quando o atleta estiver pronto.</p>
            </div>
            <div className="login-foot mono">
              v0.1 · prototipo de pré-produção · LGPD-compliant
            </div>
          </aside>

          <section className="login-form">
            <div className="login-mobile-brand">
              <div className="login-logo"><img src="assets/logo-escola-inter-bg.png" alt=""/></div>
              <div>
                <div className="login-brand-title">Escola do Inter</div>
                <div className="login-brand-sub">Rio Grande · RS</div>
              </div>
            </div>

            <div className="login-card">
              <h2>Entrar na plataforma</h2>
              <p className="login-lead">
                Acesso restrito a coordenação, professores e responsáveis cadastrados.
                Faça login com a conta Google associada à matrícula do atleta.
              </p>

              <button className="login-google" disabled={busy} onClick={() => handle('google')}>
                {busy
                  ? <span className="login-spinner"/>
                  : <svg width="20" height="20" viewBox="0 0 18 18" aria-hidden="true">
                      <path fill="#4285F4" d="M17.64 9.2c0-.64-.06-1.25-.16-1.84H9v3.48h4.84c-.21 1.13-.84 2.08-1.79 2.72v2.26h2.9c1.7-1.56 2.69-3.87 2.69-6.62z"/>
                      <path fill="#34A853" d="M9 18c2.43 0 4.46-.81 5.95-2.18l-2.9-2.26c-.8.54-1.83.86-3.05.86-2.34 0-4.32-1.58-5.03-3.71H.96v2.33A8.997 8.997 0 0 0 9 18z"/>
                      <path fill="#FBBC05" d="M3.97 10.71A5.41 5.41 0 0 1 3.68 9c0-.59.1-1.17.29-1.71V4.96H.96A8.997 8.997 0 0 0 0 9c0 1.45.35 2.82.96 4.04l3.01-2.33z"/>
                      <path fill="#EA4335" d="M9 3.58c1.32 0 2.5.45 3.44 1.35l2.58-2.58C13.46.89 11.43 0 9 0 5.48 0 2.44 2.02.96 4.96L3.97 7.3C4.68 5.16 6.66 3.58 9 3.58z"/>
                    </svg>}
                <span>{busy ? 'Conectando…' : 'Entrar com Google'}</span>
              </button>

              <div className="login-divider"><span>ou</span></div>

              <button className="login-guest" disabled={busy} onClick={() => handle('guest')}>
                Acesso visitante (modo demonstração)
              </button>

              <div className="login-disclaimer mono">
                Ao entrar, você concorda em usar a plataforma exclusivamente para acompanhar dados do(a) atleta sob sua responsabilidade. Os dados seguem a Política de Privacidade da escolinha.
              </div>
            </div>

            <div className="login-credits mono">
              Escolinha credenciada · Sport Club Internacional
            </div>
          </section>
        </div>
      );
    }

    /* ===========================================================
       App · root component with auth gate
       =========================================================== */
    function App() {
      const [user, setUser] = React.useState(() => {
        try {
          const saved = localStorage.getItem('mvp_user');
          if (saved) return JSON.parse(saved);
        } catch(e) {}
        return null;
      });

      const [route, setRoute] = React.useState(() => {
        try {
          const saved = localStorage.getItem('mvp_route');
          if (saved) return JSON.parse(saved);
        } catch(e) {}
        return { name: 'home' };
      });

      const go = (r) => {
        setRoute(r);
        try { localStorage.setItem('mvp_route', JSON.stringify(r)); } catch(e) {}
        window.scrollTo(0, 0);
      };

      const logout = () => {
        try {
          localStorage.removeItem('mvp_user');
          localStorage.removeItem('mvp_route');
        } catch(e) {}
        setUser(null);
        setRoute({ name: 'home' });
      };

      // Mobile drawer state (sidebar)
      const [drawerOpen, setDrawerOpen] = React.useState(false);
      React.useEffect(() => { setDrawerOpen(false); }, [route]);

      if (!user) return <LoginGate onLogin={setUser}/>;

      let Page = null;
      switch (route.name) {
        case 'home':          Page = <PageHome go={go}/>; break;
        case 'athletes':      Page = <PageAthletes go={go}/>; break;
        case 'athlete':       Page = <PageAthlete id={route.id} go={go}/>; break;
        case 'athlete-new':   Page = <PageAthleteNew go={go}/>; break;
        case 'athlete-eval':  Page = <PageAthleteEval id={route.id} go={go}/>; break;
        case 'anthro':        Page = <PageAnthro id={route.id} go={go}/>; break;
        case 'evolution':     Page = <PageEvolution id={route.id} go={go}/>; break;
        case 'report-parent': Page = <PageReportParent go={go}/>; break;
        case 'dossier':       Page = <PageDossier go={go}/>; break;
        case 'teams':         Page = <PageTeams go={go}/>; break;
        case 'trainings':     Page = <PageTrainings go={go}/>; break;
        case 'assessments':   Page = <PageAssessments go={go}/>; break;
        case 'videos':        Page = <PageVideos go={go}/>; break;
        case 'reports':       Page = <PageReports go={go}/>; break;
        case 'lgpd':          Page = <PageLGPD go={go}/>; break;
        case 'users':         Page = <PageUsers go={go}/>; break;
        case 'audit':         Page = <PageAudit go={go}/>; break;
        default:
          Page = (
            <div className="page">
              <div className="page-head"><div><h1 className="page-title">{route.name}</h1>
              <p className="page-sub">Seção fora do escopo MVP — placeholder.</p></div></div>
              <div className="card"><div className="card-body" style={{padding:40, textAlign:'center', color:'var(--fg-muted)'}}>
                Esta tela faz parte de módulos posteriores do roadmap.<br/>
                <button className="btn" style={{marginTop:14}} onClick={()=>go({name:'home'})}>← Voltar para visão geral</button>
              </div></div>
            </div>
          );
      }

      return (
        <div className={'app' + (drawerOpen ? ' drawer-open' : '')}>
          <Sidebar route={route} go={go} user={user} logout={logout} closeDrawer={() => setDrawerOpen(false)}/>
          {drawerOpen && <div className="drawer-backdrop" onClick={() => setDrawerOpen(false)}/>}
          <div className="main">
            <Topbar route={route} go={go} user={user} logout={logout} openDrawer={() => setDrawerOpen(true)}/>
            {Page}
          </div>
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
  </script>
</body>
</html>
